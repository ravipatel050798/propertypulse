services:
  # Backend: Flask Application
  - type: web
    name: property-pulse-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: PORT
        value: 5000

  # Frontend: React Application (Vite)
  - type: web
    name: property-pulse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: property-pulse-backend
          property: host
